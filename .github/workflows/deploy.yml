name: Deploy to Heroku

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Add Heroku remote and deploy
        env:
          HEROKU_API_KEY: ${{ secrets.HEROKU_API_KEY }}
        run: |
          cat > ~/.netrc << NETRC
          machine api.heroku.com
            login mapretlove@gmail.com
            password ${HEROKU_API_KEY}
          machine git.heroku.com
            login mapretlove@gmail.com
            password ${HEROKU_API_KEY}
          NETRC
          chmod 600 ~/.netrc
          git config --global user.email "mapretlove@gmail.com"
          git config --global user.name "MAXX-XMD Bot"
          git remote add heroku https://git.heroku.com/dare.git
          git push heroku HEAD:main --force
          echo "✅ Deployed to dare successfully"

      - name: Set config vars on ALL apps
        env:
          HEROKU_API_KEY: ${{ secrets.HEROKU_API_KEY }}
          PAYSTACK_SECRET_KEY: ${{ secrets.PAYSTACK_SECRET_KEY }}
          PAYSTACK_PUBLIC_KEY: ${{ secrets.PAYSTACK_PUBLIC_KEY }}
        run: |
          APPS=$(curl -s https://api.heroku.com/apps \
            -H "Authorization: Bearer $HEROKU_API_KEY" \
            -H "Accept: application/vnd.heroku+json; version=3" \
            | python3 -c "import json,sys; [print(a['name']) for a in json.load(sys.stdin)]")

          for app in $APPS; do
            result=$(curl -s -X PATCH "https://api.heroku.com/apps/$app/config-vars" \
              -H "Authorization: Bearer $HEROKU_API_KEY" \
              -H "Accept: application/vnd.heroku+json; version=3" \
              -H "Content-Type: application/json" \
              -d "{\"HEROKU_API_KEY\":\"$HEROKU_API_KEY\",\"HEROKU_APP_NAME\":\"$app\",\"PAYSTACK_SECRET_KEY\":\"$PAYSTACK_SECRET_KEY\",\"PAYSTACK_PUBLIC_KEY\":\"$PAYSTACK_PUBLIC_KEY\"}" \
              | python3 -c "import json,sys; d=json.load(sys.stdin); print('OK' if 'HEROKU_API_KEY' in d else d.get('message','fail'))")
            echo "$app: $result"
          done
          echo "Done."
# MAXX-XMD

